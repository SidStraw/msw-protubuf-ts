syntax = "proto3";

package playground.greeter.v1;

service GreeterService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);
  rpc WatchGreetings(WatchGreetingsRequest) returns (stream GreetingEvent);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc AddTagToArticle(AddTagToArticleRequest) returns (AddTagToArticleResponse);
}

message SayHelloRequest {
  string name = 1;
  bool fail = 2;
  int32 delay_ms = 3;
}

message SayHelloResponse {
  string message = 1;
  string request_id = 2;
}

message WatchGreetingsRequest {
  string name = 1;
  int32 count = 2;
}

message GreetingEvent {
  string message = 1;
  int32 sequence = 2;
}

message ListTagsRequest {
  string article_id = 1;
}

message ListTagsResponse {
  string article_id = 1;
  repeated ArticleTag tags = 2;
}

message AddTagToArticleRequest {
  string article_id = 1;
  string tag_id = 2;
  string label = 3;
}

message AddTagToArticleResponse {
  string article_id = 1;
  repeated ArticleTag tags = 2;
}

message ArticleTag {
  string id = 1;
  string label = 2;
}
